<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verhuizing">
<meta name="application-name" content="Verhuizing">
<meta name="theme-color" content="#1a1a18">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --bg:#f8f7f4;--surface:#fff;--surface2:#f1efe8;
    --border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
    --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
    --green:#3b6d11;--green-bg:#eaf3de;--green-mid:#639922;
    --amber:#854f0b;--amber-bg:#faeeda;--amber-mid:#ba7517;
    --red:#a32d2d;--red-bg:#fcebeb;
    --blue:#185fa5;--blue-bg:#e6f1fb;
    --radius:10px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);overscroll-behavior-y:contain;}
  .app{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem;}

  /* ── FANFARE OVERLAY ── */
  #fanfare-overlay{
    position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;
  }
  #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

  .fanfare-band{
    position:absolute;
    bottom: 30%;
    left:-420px;
    display:flex;align-items:flex-end;gap:16px;
    transition:none;
  }
  .fanfare-band.march{
    animation: marchAcross 3.2s cubic-bezier(.4,0,.6,1) forwards;
  }
  @keyframes marchAcross{
    0%{left:-420px;}
    40%{left:calc(50% - 200px);}
    60%{left:calc(50% - 200px);}
    100%{left:110%;}
  }

  .fanfare-persoon{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    animation:bobben .4s ease-in-out infinite alternate;
  }
  .fanfare-persoon:nth-child(2){animation-delay:.1s;}
  .fanfare-persoon:nth-child(3){animation-delay:.2s;}
  .fanfare-persoon:nth-child(4){animation-delay:.05s;}
  .fanfare-persoon:nth-child(5){animation-delay:.15s;}
  @keyframes bobben{0%{transform:translateY(0)}100%{transform:translateY(-8px)}}

  .fp-lichaam{
    width:44px;height:56px;border-radius:10px 10px 4px 4px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;position:relative;
  }
  .fp-hoofd{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;margin-bottom:2px;
    border:2px solid rgba(0,0,0,.15);
  }
  .fp-trompet{
    position:absolute;right:-22px;top:14px;
    font-size:20px;
    animation:trompetSchud .3s ease-in-out infinite alternate;
  }
  @keyframes trompetSchud{0%{transform:rotate(-5deg)}100%{transform:rotate(8deg)}}
  .fp-benen{display:flex;gap:4px;}
  .fp-been{
    width:10px;height:18px;background:currentColor;border-radius:3px;
    opacity:.8;
    animation:marchen .4s ease-in-out infinite alternate;
  }
  .fp-been:first-child{animation-direction:alternate-reverse;}
  @keyframes marchen{0%{transform:rotate(15deg)}100%{transform:rotate(-15deg)}}

  .noten-wrap{
    position:absolute;bottom:calc(30% + 80px);
    left:0;width:100%;pointer-events:none;
  }
  .noot{
    position:absolute;font-size:20px;
    animation:nootVliegt 1.2s ease-out forwards;
    opacity:0;
  }
  @keyframes nootVliegt{
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.6);}
  }

  .kamer-klaar-banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);
    background:white;border-radius:20px;padding:24px 36px;
    text-align:center;z-index:1000;pointer-events:none;
    box-shadow:0 8px 40px rgba(0,0,0,.18);
    opacity:0;
    animation:bannerIn .5s .4s cubic-bezier(.34,1.56,.64,1) forwards, bannerUit .4s 2.8s ease-in forwards;
  }
  @keyframes bannerIn{to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  @keyframes bannerUit{to{opacity:0;transform:translate(-50%,-60%) scale(.9);}}
  .kamer-klaar-banner .emoji{font-size:42px;display:block;margin-bottom:8px;}
  .kamer-klaar-banner .tekst{font-size:22px;font-weight:600;color:#1a1a18;}
  .kamer-klaar-banner .sub{font-size:14px;color:#5f5e5a;margin-top:4px;}

  /* ── REST ── */
  .ptr{display:flex;align-items:center;justify-content:center;gap:8px;height:0;overflow:hidden;font-size:13px;color:var(--text2);transition:height .15s;}
  .ptr.visible{height:44px;}
  .ptr i{font-size:18px;transition:transform .3s;}
  .ptr.ready i{transform:rotate(180deg);color:var(--green-mid);}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .logo{width:38px;height:38px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .logo i{color:white;font-size:20px;}
  .title{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
  .subtitle{font-size:13px;color:var(--text2);margin-top:1px;}
  .gs-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 14px;display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
  .gs-bar span{font-family:var(--mono);font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gs-status{display:flex;align-items:center;gap:6px;font-size:12px;white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .dot.ok{background:var(--green-mid);}
  .dot.busy{background:var(--amber-mid);animation:pulse 1s infinite;}
  .dot.err{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .btn{border:0.5px solid var(--border-strong);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;padding:6px 14px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .1s;}
  .btn:hover{background:var(--surface2);}
  .btn.primary{background:var(--text);color:white;border-color:var(--text);}
  .btn.primary:hover{background:#333;}
  .btn.sm{font-size:12px;padding:4px 10px;}
  .btn.icon{padding:6px 10px;}
  .btn.danger{color:var(--red);border-color:rgba(163,45,45,.3);}
  .btn.danger:hover{background:var(--red-bg);}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
  .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;}
  .stat-val{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
  .stat-lbl{font-size:12px;color:var(--text2);margin-top:2px;}
  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);}
  .tab{font-size:13px;font-weight:500;padding:8px 14px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--font);}
  .tab.active{color:var(--text);border-bottom-color:var(--text);}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:3rem 0;color:var(--text2);font-size:14px;}
  .spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-state{background:var(--red-bg);border:0.5px solid rgba(163,45,45,.2);border-radius:var(--radius);padding:16px;color:var(--red);font-size:13px;display:flex;flex-direction:column;gap:10px;}
  .kamer-groep{margin-bottom:1.5rem;}
  .kamer-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;}
  .kamer-header:hover{border-color:var(--border-strong);}
  .kamer-header.afgerond{background:var(--green-bg);border-color:rgba(59,109,17,.2);}
  .kamer-naam{font-size:14px;font-weight:600;flex:1;}
  .kamer-progress{display:flex;align-items:center;gap:8px;}
  .progress-bar{width:70px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;background:var(--green-mid);transition:width .3s;}
  .progress-txt{font-size:12px;color:var(--text2);font-family:var(--mono);white-space:nowrap;}
  .kamer-badge-done{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);white-space:nowrap;}
  .chevron{font-size:16px;color:var(--text3);transition:transform .2s;}
  .chevron.open{transform:rotate(180deg);}
  .kamer-taken{display:flex;flex-direction:column;gap:6px;padding:0 0 4px;}
  .task-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:12px;}
  .task-item:hover{border-color:var(--border-strong);}
  .task-item.done{opacity:.5;}
  .task-item.pop{animation:pop .3s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
  .task-check{width:18px;height:18px;border:1.5px solid var(--border-strong);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .task-check.checked{background:var(--green-mid);border-color:var(--green-mid);}
  .task-check.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
  .task-body{flex:1;min-width:0;cursor:pointer;}
  .task-name{font-size:13px;font-weight:500;}
  .task-name.done-text{text-decoration:line-through;}
  .task-meta{font-size:11px;color:var(--text2);margin-top:1px;}
  .task-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;}
  .badge.locatie{background:var(--blue-bg);color:var(--blue);}
  .wie-pill{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;white-space:nowrap;}
  .wie-0{background:#e6f1fb;color:#185fa5;}
  .wie-1{background:#eeedfe;color:#534ab7;}
  .wie-2{background:#e1f5ee;color:#0f6e56;}
  .wie-3{background:var(--amber-bg);color:var(--amber);}
  .wie-x{background:var(--surface2);color:var(--text3);}
  .namen-sectie{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:1.5rem;}
  .namen-titel{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .namen-lijst{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .naam-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:0.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;}
  .naam-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0;display:flex;align-items:center;}
  .naam-chip button:hover{color:var(--red);}
  .naam-add{display:flex;gap:6px;}
  .naam-add input{border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;padding:5px 10px;border-radius:20px;outline:none;width:130px;}
  .add-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
  .add-row input,.add-row select{border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 11px;border-radius:7px;outline:none;}
  .add-row input.grow{flex:1;min-width:150px;}
  .box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .box-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;}
  .box-card:hover{border-color:var(--border-strong);}
  .box-num{font-family:var(--mono);font-size:11px;color:var(--text3);}
  .box-name{font-size:14px;font-weight:600;margin-top:2px;}
  .box-room{font-size:12px;color:var(--text2);}
  .box-items{margin-top:10px;border-top:0.5px solid var(--border);padding-top:8px;}
  .box-item{font-size:12px;color:var(--text2);padding:2px 0;display:flex;align-items:center;gap:6px;}
  .box-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .add-box-card{background:var(--surface2);border:0.5px dashed var(--border-strong);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:100px;color:var(--text2);font-size:13px;}
  .planning-list{display:flex;flex-direction:column;gap:6px;}
  .plan-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:14px;}
  .plan-date{font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;min-width:80px;}
  .plan-body{flex:1;}
  .plan-name{font-size:14px;font-weight:500;}
  .plan-note{font-size:12px;color:var(--text2);margin-top:1px;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:1.2rem;}
  .modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px;}
  .modal input,.modal select,.modal textarea{width:100%;border:0.5px solid var(--border-strong);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 11px;border-radius:7px;outline:none;}
  .modal textarea{resize:vertical;min-height:70px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;}
  .wie-kiezer{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .wie-opt{padding:5px 14px;border-radius:20px;border:0.5px solid var(--border-strong);background:var(--surface2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--text2);}
  .wie-opt.selected{background:var(--text);color:white;border-color:var(--text);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:13px;padding:10px 18px;border-radius:8px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.err{background:var(--red);}
  .toast.ok{background:var(--green-mid);}
</style>
</head>
<body>
<div id="fanfare-overlay">
  <div id="fanfare-band" class="fanfare-band"></div>
  <div id="noten-wrap" class="noten-wrap"></div>
</div>
<canvas id="confetti-canvas"></canvas>
<div id="ptr" class="ptr"><i class="ti ti-refresh" aria-hidden="true"></i><span id="ptr-txt">Omlaag trekken om te vernieuwen</span></div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-truck" aria-hidden="true"></i></div>
      <div><div class="title">Verhuisplanner</div><div class="subtitle">Live · Google Sheets</div></div>
    </div>
    <button class="btn icon" onclick="laadData(true)"><i class="ti ti-refresh" aria-hidden="true"></i></button>
  </div>
  <div class="gs-bar">
    <i class="ti ti-table" style="color:var(--text3);font-size:16px" aria-hidden="true"></i>
    <span>ctugrtcclwsdsriafxbt.supabase.co</span>
    <div class="gs-status">
      <div class="dot busy" id="gs-dot"></div>
      <span id="gs-label" style="color:var(--amber-mid)">Laden...</span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Totaal taken</div></div>
    <div class="stat"><div class="stat-val" id="s-done" style="color:var(--green-mid)">—</div><div class="stat-lbl">Afgerond</div></div>
    <div class="stat"><div class="stat-val" id="s-kamers">—</div><div class="stat-lbl">Kamers klaar</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('taken',this)"><i class="ti ti-checklist" aria-hidden="true"></i> Taken</button>
    <button class="tab" onclick="switchTab('dozen',this)"><i class="ti ti-package" aria-hidden="true"></i> Dozen</button>
    <button class="tab" onclick="switchTab('planning',this)"><i class="ti ti-calendar" aria-hidden="true"></i> Planning</button>
  </div>
  <div id="tab-taken">
    <div class="namen-sectie">
      <div class="namen-titel"><i class="ti ti-users" style="font-size:15px" aria-hidden="true"></i> Personen</div>
      <div class="namen-lijst" id="namen-lijst"></div>
    </div>
    <div id="kamer-lijst"><div class="loading"><div class="spinner"></div>Data ophalen...</div></div>
    <div class="add-row">
      <input class="grow" type="text" id="new-task-name" placeholder="Nieuwe taak toevoegen...">
      <select id="new-task-kamer"></select>
      <select id="new-task-locatie"><option>Oud adres</option><option>Nieuw adres</option><option>Onderweg</option><option>Extern</option></select>
      <select id="new-task-wie"></select>
      <input type="date" id="new-task-datum" style="width:120px">
      <button class="btn primary" onclick="addTask()"><i class="ti ti-plus" aria-hidden="true"></i></button>
    </div>
  </div>
  <div id="tab-dozen" style="display:none"><div id="box-grid-wrap"><div class="loading"><div class="spinner"></div>Laden...</div></div></div>
  <div id="tab-planning" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <span style="font-size:14px;font-weight:600;">Verhuisplanning</span>
      <button class="btn sm" onclick="openPlanModal()"><i class="ti ti-plus" aria-hidden="true"></i> Toevoegen</button>
    </div>
    <div id="planning-list"><div class="loading"><div class="spinner"></div>Laden...</div></div>
  </div>
</div>

<div id="task-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal('task-modal')">
  <div class="modal">
    <div class="modal-title">Taak bewerken</div>
    <label>Naam</label><input type="text" id="tm-naam">
    <label>Kamer</label><select id="tm-kamer"></select>
    <label>Locatie</label><select id="tm-locatie"><option>Oud adres</option><option>Nieuw adres</option><option>Onderweg</option><option>Extern</option></select>
    <label>Wie</label><div class="wie-kiezer" id="tm-wie-kiezer"></div>
    <label>Datum</label><input type="date" id="tm-datum">
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteTaskModal()"><i class="ti ti-trash" aria-hidden="true"></i> Verwijder</button>
      <button class="btn" onclick="closeModal('task-modal')">Annuleer</button>
      <button class="btn primary" onclick="saveTaskModal()">Opslaan</button>
    </div>
  </div>
</div>
<div id="box-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal('box-modal')">
  <div class="modal">
    <div class="modal-title" id="box-modal-title">Nieuwe doos</div>
    <label>Naam</label><input type="text" id="bm-naam">
    <label>Van</label><select id="bm-van"></select>
    <label>Naar</label><select id="bm-naar"></select>
    <label>Inhoud (één per regel)</label><textarea id="bm-items" placeholder="Borden&#10;Glazen..."></textarea>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteBoxModal()"><i class="ti ti-trash" aria-hidden="true"></i> Verwijder</button>
      <button class="btn" onclick="closeModal('box-modal')">Annuleer</button>
      <button class="btn primary" onclick="saveBox()">Opslaan</button>
    </div>
  </div>
</div>
<div id="plan-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal('plan-modal')">
  <div class="modal">
    <div class="modal-title">Afspraak toevoegen</div>
    <label>Omschrijving</label><input type="text" id="pm-naam">
    <label>Datum</label><input type="date" id="pm-datum">

<script>
const KAMERS=[
  {naam:'Keuken',icon:'ti-tool-kitchen-2'},{naam:'Woonkamer',icon:'ti-sofa'},

];
const kamerIcon=k=>(KAMERS.find(x=>x.naam===k)||{icon:'ti-home'}).icon;
const WIEKLEUREN=['wie-0','wie-1','wie-2','wie-3'];

let taken=[], dozen=[], planning=[];
let namen=['Eva','Jesper','Samen'];
let collapsed={}, editingTaskId=null, editingBoxId=null, activeTab='taken', saveTimer=null;

// ── AUDIO ──
let audioCtx=null;
function getAudio(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    return audioCtx;
  }catch(e){return null;}
}

function noot(ctx,freq,start,dur,vol=0.15,type='sawtooth'){
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.type=type;osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,ctx.currentTime+start);
  gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.02);
  gain.gain.setValueAtTime(vol,ctx.currentTime+start+dur-0.04);
  gain.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur);
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+dur+0.05);
}

function speelTrompet(){
  try{
    const c=getAudio();if(!c)return;
    noot(c,523.25,0,.15);noot(c,659.25,.15,.15);noot(c,783.99,.3,.15);noot(c,1046.5,.45,.3);
  }catch(e){}
}

function speelKamerSolo(){
  try{
    const c=getAudio();if(!c)return;
    // Uitgebreide fanfare solo ~4 seconden
    const melodie=[
      // Opkomst
      [392,0,.1],[523.25,.1,.1],[659.25,.2,.1],[783.99,.3,.1],
      // Eerste thema
      [1046.5,.45,.2,.2],[987.77,.65,.1],[880,.75,.1],[783.99,.85,.2,.2],
      [880,1.05,.1],[987.77,1.15,.1],[1046.5,1.25,.3,.22],
      // Brug
      [880,1.6,.1],[783.99,1.7,.1],[698.46,1.8,.1],[659.25,1.9,.15],
      // Tweede thema — hoger
      [1174.66,2.1,.15,.18],[1318.51,2.25,.15,.18],[1396.91,2.4,.15,.18],[1567.98,2.55,.2,.22],
      [1396.91,2.8,.1],[1318.51,2.9,.1],[1174.66,3.0,.1],
      // Finale
      [987.77,3.15,.1],[1046.5,3.25,.1],[1174.66,3.35,.1],
      [1318.51,3.5,.6,.28],
    ];
    melodie.forEach(([freq,s,d,vol=0.16])=>noot(c,freq,s,d,vol));
    // Achtergrond akkoord
    [[261.63,0,4,.06],[329.63,0,4,.04],[392,0,4,.04]].forEach(([f,s,d,v])=>noot(c,f,s,d,v,'sine'));
  }catch(e){}
}

// ── CONFETTI ──
const canvas=document.getElementById('confetti-canvas');
const ctx2=canvas.getContext('2d');
let stukjes=[],animId=null;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
const CC=['#639922','#185fa5','#ba7517','#a32d2d','#534ab7','#0f6e56','#e6b800','#e05c2a','#ff6b9d','#00d4aa'];

function startConfetti(n=80,burst=false){
  for(let i=0;i<n;i++){
    const x=burst?Math.random()*canvas.width:Math.random()*canvas.width;
    stukjes.push({
      x,y:burst?canvas.height*.3*Math.random()-20:-10-Math.random()*60,
      w:5+Math.random()*8,h:8+Math.random()*10,
      r:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.25,
      vx:(Math.random()-.5)*4,vy:1.5+Math.random()*4,
      kleur:CC[Math.floor(Math.random()*CC.length)],alpha:1,
      vorm:Math.random()>.5?'rect':'circle'
    });
  }
  if(!animId)animeerConfetti();
}

function animeerConfetti(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  stukjes=stukjes.filter(p=>p.alpha>.04);
  stukjes.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.r+=p.rv;p.vy+=0.06;
    if(p.y>canvas.height*.75)p.alpha-=.018;
    ctx2.save();ctx2.globalAlpha=p.alpha;ctx2.translate(p.x,p.y);ctx2.rotate(p.r);
    ctx2.fillStyle=p.kleur;
    if(p.vorm==='circle'){ctx2.beginPath();ctx2.arc(0,0,p.w/2,0,Math.PI*2);ctx2.fill();}
    else ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx2.restore();
  });
  if(stukjes.length>0)animId=requestAnimationFrame(animeerConfetti);
  else{animId=null;ctx2.clearRect(0,0,canvas.width,canvas.height);}
}

// ── FANFARE BAND ANIMATIE ──
const BAND_KLEUREN=[
  {lichaam:'#e63946',hoofd:'#ffd166',emoji:'🎺'},
  {lichaam:'#2196f3',hoofd:'#ffd166',emoji:'🎺'},
  {lichaam:'#4caf50',hoofd:'#ffd166',emoji:'🎺'},
  {lichaam:'#ff9800',hoofd:'#ffd166',emoji:'🥁'},
  {lichaam:'#9c27b0',hoofd:'#ffd166',emoji:'🎺'},
];

function speelFanfareBand(kamerNaam){
  const overlay=document.getElementById('fanfare-overlay');
  const band=document.getElementById('fanfare-band');
  const notenWrap=document.getElementById('noten-wrap');
  overlay.style.display='block';

  // Bouw band
  band.innerHTML=BAND_KLEUREN.map((p,i)=>`
    <div class="fanfare-persoon" style="animation-delay:${i*.08}s">
      <div class="fp-hoofd" style="background:${p.hoofd}">${p.emoji}</div>
      <div class="fp-lichaam" style="background:${p.lichaam};color:${p.lichaam}">
        <span class="fp-trompet" style="animation-delay:${i*.07}s">🎺</span>
      </div>
      <div class="fp-benen" style="color:${p.lichaam}">
        <div class="fp-been"></div>
        <div class="fp-been"></div>
      </div>
    </div>`).join('');

  // Banner
  const oud=document.getElementById('kamer-klaar-banner');if(oud)oud.remove();
  const banner=document.createElement('div');
  banner.id='kamer-klaar-banner';banner.className='kamer-klaar-banner';
  banner.innerHTML=`<span class="emoji">🎉</span><div class="tekst">${kamerNaam} klaar!</div><div class="sub">Fantastisch gedaan!</div>`;
  document.body.appendChild(banner);

  // March animatie
  band.classList.remove('march');
  void band.offsetWidth;
  band.classList.add('march');

  // Muzieknoten spawnen
  const NOTEN=['♩','♪','♫','♬','🎵','🎶'];
  let notenTimer=0;
  function spawnNoot(){
    const el=document.createElement('div');
    el.className='noot';
    el.textContent=NOTEN[Math.floor(Math.random()*NOTEN.length)];
    el.style.left=(20+Math.random()*60)+'%';
    el.style.setProperty('--dx',(Math.random()-.5)*80+'px');
    el.style.setProperty('--dy',(-60-Math.random()*60)+'px');
    el.style.animationDelay=(Math.random()*.3)+'s';
    notenWrap.appendChild(el);
    setTimeout(()=>el.remove(),1500);
  }
  for(let i=0;i<24;i++) setTimeout(spawnNoot,i*160);

  // Confetti golven
  startConfetti(120);
  setTimeout(()=>startConfetti(120),800);
  setTimeout(()=>startConfetti(120),1600);
  setTimeout(()=>startConfetti(80),2400);
  setTimeout(()=>startConfetti(80),3200);

  // Opruimen
  setTimeout(()=>{
    band.classList.remove('march');
    band.innerHTML='';
    overlay.style.display='none';
    const b=document.getElementById('kamer-klaar-banner');if(b)b.remove();
  },3800);
}

// ── STATUS ──
function setStatus(staat,tekst){
  const dot=document.getElementById('gs-dot'),lbl=document.getElementById('gs-label');
  dot.className='dot '+staat;lbl.textContent=tekst;
  lbl.style.color=staat==='ok'?'var(--green-mid)':staat==='busy'?'var(--amber-mid)':'var(--red)';
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>{t.className='toast';},3500);
}

// ── SUPABASE CONFIG ──
const SUPABASE_URL='https://ctugrtcclwsdsriafxbt.supabase.co';
const SUPABASE_KEY='sb_publishable_h8-NnMFZLLxgbM0vg43oXQ_jx5TVy5y';
const SB_HEADERS={
  'apikey':SUPABASE_KEY,
  'Authorization':'Bearer '+SUPABASE_KEY,
  'Accept':'application/json',
  'Content-Type':'application/json'
};
async function sbGet(table){
  const controller=new AbortController();
  const tid=setTimeout(()=>controller.abort(),12000);
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/'+table+'?select=*',{
      method:'GET',headers:SB_HEADERS,signal:controller.signal
    });
    clearTimeout(tid);
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }catch(e){clearTimeout(tid);if(e.name==='AbortError')throw new Error('Timeout (12s) – geen verbinding');throw e;}
}
async function sbUpsert(table,rows){
  if(!rows.length)return;
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify(rows)
  });
  if(!r.ok){const t=await r.text();throw new Error(t);}
}
async function sbDelete(table,ids){
  if(!ids.length)return;
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+table+'?id=in.('+ids.map(i=>'"'+i+'"').join(',')+')',{
    method:'DELETE',
    headers:SB_HEADERS
  });
  if(!r.ok){const t=await r.text();throw new Error(t);}
}

// ── LADEN ──
async function laadData(feedback=false){
  setStatus('busy','Laden...');
  try{
    const [t,d,p]=await Promise.all([sbGet('taken'),sbGet('dozen'),sbGet('planning')]);
    verwerkData({taken:t,dozen:d,planning:p},feedback);
  }catch(err){
    setStatus('err','Laden mislukt');
    const hint=err.message.includes('Timeout')?'Geen internet of Supabase onbereikbaar.':
               err.message.includes('Failed to fetch')||err.message.includes('NetworkError')?'Netwerk-fout – controleer je verbinding.':
               err.message;
    document.getElementById('kamer-lijst').innerHTML=`<div class="error-state"><span>⚠️ ${hint}</span><br><small style="color:var(--red);opacity:.7">${err.message}</small><br><br><button class="btn sm" onclick="laadData(true)">Opnieuw proberen</button></div>`;
    if(feedback)showToast('Laden mislukt','err');
  }
}
function verwerkData(json,feedback=false){
  taken=(json.taken||[]).map((r,i)=>({
    id:String(r.id||'t'+i),naam:String(r.naam||''),
    kamer:String(r.kamer||'Algemeen'),locatie:String(r.locatie||'Oud adres'),
    wie:String(r.wie||'—'),datum:datumStr(r.datum),
    done:String(r.status||'').toLowerCase()==='klaar'
  }));
  dozen=(json.dozen||[]).map((r,i)=>({
    id:String(r.id||'d'+i),naam:String(r.naam||''),
    van:String(r.van||''),naar:String(r.naar||''),
    items:String(r.items||'').split(';').map(s=>s.trim()).filter(Boolean)
  }));
  planning=(json.planning||[]).map((r,i)=>({
    id:String(r.id||'p'+i),naam:String(r.naam||''),
    datum:datumStr(r.datum),cat:String(r.cat||'Overig'),
    note:String(r.note||'')
  }));
  const wieUitSheet=[...new Set(taken.map(t=>t.wie).filter(w=>w&&w!=='—'))];
  wieUitSheet.forEach(w=>{if(!namen.includes(w))namen.push(w);});
  setStatus('ok','Verbonden');updateStats();renderActiefTab();
  if(feedback)showToast('✓ Data vernieuwd','ok');
}

// ── OPSLAAN ──
let _saving=false;
function slaOp(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(_doSave,600);}
async function _doSave(){
  if(_saving){saveTimer=setTimeout(_doSave,600);return;}
  _saving=true;
  setStatus('busy','Opslaan...');
  try{
    await Promise.all([
      sbUpsert('taken',taken.map(t=>({id:t.id,naam:t.naam,kamer:t.kamer,locatie:t.locatie,datum:t.datum||null,status:t.done?'Klaar':'Open',wie:t.wie||'—'}))),
      sbUpsert('dozen',dozen.map(d=>({id:d.id,naam:d.naam,van:d.van,naar:d.naar,items:Array.isArray(d.items)?d.items.join('; '):''}))),
      sbUpsert('planning',planning.map(p=>({id:p.id,naam:p.naam,datum:p.datum||null,cat:p.cat,note:p.note||''})))
    ]);
    _saving=false;
    setStatus('ok','Opgeslagen ✓');setTimeout(()=>setStatus('ok','Verbonden'),2000);
  }catch(e){
    _saving=false;
    setStatus('err','Opslaan mislukt');showToast('Opslaan mislukt: '+e.message,'err');
  }
}

function datumStr(v){
  if(!v||v===false||v==='false'||v==='')return'';
  if(v instanceof Date)return v.toISOString().slice(0,10);
  const s=String(v);if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);return s;
}
function updateStats(){
  document.getElementById('s-total').textContent=taken.length;
  document.getElementById('s-done').textContent=taken.filter(t=>t.done).length;
  const kamers=[...new Set(taken.map(t=>t.kamer))];
  const klaar=kamers.filter(k=>taken.filter(t=>t.kamer===k).every(t=>t.done));
  document.getElementById('s-kamers').textContent=klaar.length+'/'+kamers.length;
}
function renderActiefTab(){
  if(activeTab==='taken'){renderNamen();renderTaken();}
  else if(activeTab==='dozen')renderDozen();
  else if(activeTab==='planning')renderPlanning();
}

// ── NAMEN ──
function wieKleur(wie){const i=namen.indexOf(wie);return i>=0?WIEKLEUREN[Math.min(i,WIEKLEUREN.length-1)]:'wie-x';}
function renderNamen(){
  document.getElementById('namen-lijst').innerHTML=
    namen.map(n=>`<div class="naam-chip"><span style="font-size:12px;font-weight:500">${n}</span>${namen.length>1?`<button onclick="verwijderNaam('${n}')"><i class="ti ti-x"></i></button>`:''}</div>`).join('')+
    `<div class="naam-add"><input type="text" id="nieuwe-naam-input" placeholder="Naam toevoegen..." onkeydown="if(event.key==='Enter')voegNaamToe()"><button class="btn sm" onclick="voegNaamToe()"><i class="ti ti-plus"></i></button></div>`;
  const sel=document.getElementById('new-task-wie');
  if(sel)sel.innerHTML=['—',...namen].map(n=>`<option value="${n}">${n}</option>`).join('');
}
function voegNaamToe(){const el=document.getElementById('nieuwe-naam-input');const n=el.value.trim();if(!n||namen.includes(n))return;namen.push(n);el.value='';renderNamen();}
function verwijderNaam(naam){namen=namen.filter(n=>n!==naam);taken.forEach(t=>{if(t.wie===naam)t.wie='—';});renderNamen();renderTaken();}

// ── TAKEN ──
function renderTaken(){
  const kamersInData=[...new Set(taken.map(t=>t.kamer))];
  const ordered=KAMERS.map(k=>k.naam).filter(k=>kamersInData.includes(k));
  kamersInData.filter(k=>!ordered.includes(k)).forEach(k=>ordered.push(k));
  if(!ordered.length){document.getElementById('kamer-lijst').innerHTML='<div style="color:var(--text2);font-size:14px;padding:1rem 0">Geen taken. Voeg er een toe.</div>';return;}
  document.getElementById('kamer-lijst').innerHTML=ordered.map(kamer=>{
    const kt=taken.filter(t=>t.kamer===kamer);
    const done=kt.filter(t=>t.done).length,total=kt.length;
    const pct=total?Math.round(done/total*100):0;
    const afgerond=total>0&&done===total,coll=collapsed[kamer];
    return `<div class="kamer-groep">
      <div class="kamer-header ${afgerond?'afgerond':''}" onclick="toggleCollapse('${kamer}')">
        <i class="ti ${kamerIcon(kamer)}" style="font-size:18px;color:var(--text2)"></i>
        <span class="kamer-naam">${kamer}</span>
        <div class="kamer-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-txt">${done}/${total}</span>
          ${afgerond?'<span class="kamer-badge-done"><i class="ti ti-check" style="font-size:11px"></i> Klaar</span>':''}
        </div>
        <i class="ti ti-chevron-down chevron ${coll?'':'open'}"></i>
      </div>
      <div class="kamer-taken" style="display:${coll?'none':'flex'}">
        ${kt.map(t=>`<div class="task-item ${t.done?'done':''}" id="task-${t.id}">
          <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
          <div class="task-body" onclick="openTaskModal('${t.id}')">
            <div class="task-name ${t.done?'done-text':''}">${t.naam}</div>
            <div class="task-meta">${t.datum?'📅 '+formatDate(t.datum):''}</div>
          </div>
          <div class="task-right">
            <span class="badge locatie">${t.locatie}</span>
            <span class="wie-pill ${wieKleur(t.wie)}">${t.wie||'—'}</span>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCollapse(kamer){collapsed[kamer]=!collapsed[kamer];renderTaken();}

function toggleTask(id){
  const t=taken.find(t=>t.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done){
    const el=document.getElementById('task-'+id);
    if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),300);}
    const kamerTaken=taken.filter(x=>x.kamer===t.kamer);
    const kamerKlaar=kamerTaken.every(x=>x.done);
    if(kamerKlaar){
      speelKamerSolo();
      speelFanfareBand(t.kamer);
    } else {
      speelTrompet();
      startConfetti(70);
    }
  }
  updateStats();renderTaken();slaOp();
}

function openTaskModal(id){
  editingTaskId=id;const t=taken.find(t=>t.id===id);if(!t)return;
  document.getElementById('tm-naam').value=t.naam;
  document.getElementById('tm-kamer').value=t.kamer;
  document.getElementById('tm-locatie').value=t.locatie;
  document.getElementById('tm-datum').value=t.datum||'';
  document.getElementById('tm-wie-kiezer').innerHTML=['—',...namen].map(n=>`<button class="wie-opt ${(t.wie||'—')===n?'selected':''}" onclick="document.querySelectorAll('.wie-opt').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">${n}</button>`).join('');
  document.getElementById('task-modal').style.display='flex';
}
function saveTaskModal(){
  const t=taken.find(t=>t.id===editingTaskId);
  if(t){t.naam=document.getElementById('tm-naam').value.trim()||t.naam;t.kamer=document.getElementById('tm-kamer').value;t.locatie=document.getElementById('tm-locatie').value;t.wie=(document.querySelector('.wie-opt.selected')||{textContent:'—'}).textContent;t.datum=document.getElementById('tm-datum').value||'';}
  closeModal('task-modal');updateStats();renderTaken();slaOp();
}
async function deleteTaskModal(){await sbDelete('taken',[editingTaskId]);taken=taken.filter(t=>t.id!==editingTaskId);closeModal('task-modal');updateStats();renderTaken();}
function addTask(){
  const naam=document.getElementById('new-task-name').value.trim();if(!naam)return;
  taken.push({id:'t'+Date.now(),naam,kamer:document.getElementById('new-task-kamer').value,locatie:document.getElementById('new-task-locatie').value,wie:document.getElementById('new-task-wie').value,datum:document.getElementById('new-task-datum').value||'',done:false});
  document.getElementById('new-task-name').value='';
  updateStats();renderTaken();slaOp();
}

// ── DOZEN ──
function renderDozen(){
  document.getElementById('box-grid-wrap').innerHTML=`<div class="box-grid">${dozen.map(d=>`<div class="box-card" onclick="openBoxModal('${d.id}')"><div class="box-num">DOOS</div><div class="box-name">${d.naam}</div><div class="box-room"><i class="ti ti-arrow-right" style="font-size:11px"></i> ${d.naar}</div><div class="box-items">${d.items.slice(0,4).map(i=>`<div class="box-item">${i}</div>`).join('')}${d.items.length>4?`<div style="font-size:11px;color:var(--text3);margin-top:2px">+${d.items.length-4} meer</div>`:''}</div></div>`).join('')}<div class="add-box-card" onclick="openBoxModal(null)"><i class="ti ti-package" style="font-size:24px;color:var(--text3)"></i><span>Nieuwe doos</span></div></div>`;
}
function openBoxModal(id){editingBoxId=id;const d=id?dozen.find(x=>x.id===id):null;document.getElementById('box-modal-title').textContent=id?'Doos bewerken':'Nieuwe doos';document.getElementById('bm-naam').value=d?d.naam:'';document.getElementById('bm-van').value=d?d.van:'Keuken';document.getElementById('bm-naar').value=d?d.naar:'Keuken';document.getElementById('bm-items').value=d?d.items.join('\n'):'';document.getElementById('box-modal').style.display='flex';}
async function deleteBoxModal(){await sbDelete('dozen',[editingBoxId]);dozen=dozen.filter(d=>d.id!==editingBoxId);closeModal('box-modal');renderDozen();}
function saveBox(){const naam=document.getElementById('bm-naam').value.trim();if(!naam)return;const items=document.getElementById('bm-items').value.split('\n').map(s=>s.trim()).filter(Boolean);if(editingBoxId){const d=dozen.find(x=>x.id===editingBoxId);if(d){d.naam=naam;d.van=document.getElementById('bm-van').value;d.naar=document.getElementById('bm-naar').value;d.items=items;}}else dozen.push({id:'d'+Date.now(),naam,van:document.getElementById('bm-van').value,naar:document.getElementById('bm-naar').value,items});closeModal('box-modal');renderDozen();slaOp();}

// ── PLANNING ──
function renderPlanning(){
  const sorted=[...planning].sort((a,b)=>String(a.datum).localeCompare(String(b.datum)));
  document.getElementById('planning-list').innerHTML=sorted.length?sorted.map(p=>`<div class="plan-item"><div class="plan-date">${formatDate(p.datum)}</div><div class="plan-body"><div class="plan-name">${p.naam}</div>${p.note?`<div class="plan-note">${p.note}</div>`:''}</div><span class="badge locatie">${p.cat}</span><button class="btn sm danger" onclick="deletePlan('${p.id}')"><i class="ti ti-trash"></i></button></div>`).join(''):'<div style="color:var(--text2);font-size:14px;padding:1rem 0">Nog geen afspraken.</div>';
}
function openPlanModal(){document.getElementById('plan-modal').style.display='flex';}
function savePlan(){const naam=document.getElementById('pm-naam').value.trim();const datum=document.getElementById('pm-datum').value;if(!naam||!datum)return;planning.push({id:'p'+Date.now(),naam,datum,cat:document.getElementById('pm-cat').value,note:document.getElementById('pm-note').value.trim()});closeModal('plan-modal');['pm-naam','pm-datum','pm-note'].forEach(id=>document.getElementById(id).value='');renderPlanning();slaOp();}
async function deletePlan(id){await sbDelete('planning',[id]);planning=planning.filter(p=>p.id!==id);renderPlanning();}
function closeModal(id){document.getElementById(id).style.display='none';}
function formatDate(d){if(!d)return'';try{return new Date(d+'T00:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}catch{return d;}}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');activeTab=tab;
  ['taken','dozen','planning'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
  renderActiefTab();
}
function populateKamerSelects(){
  ['new-task-kamer','tm-kamer','bm-van','bm-naar'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.innerHTML=KAMERS.map(k=>`<option value="${k.naam}">${k.naam}</option>`).join('');
  });
}

// ── PULL TO REFRESH ──
let ptrStart=0,ptrReady=false;
const ptrEl=document.getElementById('ptr');
document.addEventListener('touchstart',e=>{if(window.scrollY===0)ptrStart=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{if(!ptrStart)return;const diff=e.touches[0].clientY-ptrStart;if(diff>20&&window.scrollY===0){ptrEl.style.height=Math.min(diff-20,80)+'px';ptrEl.classList.add('visible');ptrReady=diff>100;ptrEl.classList.toggle('ready',ptrReady);document.getElementById('ptr-txt').textContent=ptrReady?'Loslaten om te vernieuwen':'Omlaag trekken om te vernieuwen';}},{passive:true});
document.addEventListener('touchend',async()=>{if(ptrReady)await laadData(true);ptrEl.style.height='0';ptrEl.classList.remove('visible','ready');ptrStart=0;ptrReady=false;},{passive:true});

document.getElementById('fanfare-overlay').style.display='none';
populateKamerSelects();renderNamen();laadData();
</script>
</body>
